<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeanLight Simulations</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Segoe UI', system-ui, sans-serif; }
        #overlay { position: absolute; inset: 0; pointer-events: none; 
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85) 100%); z-index: 10; }
        #ui-layer { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none; z-index: 15; }
        #joystick { width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; backdrop-filter: blur(8px); }
        #stick { width: 45px; height: 45px; background: #fff; border-radius: 50%; transition: transform 0.1s ease-out; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        #jump-btn { width: 90px; height: 90px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 14px; pointer-events: auto; backdrop-filter: blur(8px); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; user-select: none; }
        #perf { position: absolute; top: 20px; left: 20px; color: #777; font-size: 9px; letter-spacing: 4px; z-index: 20; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="perf">BeanLight Simulations</div>
    <div id="overlay"></div>
    <div id="ui-layer">
        <div id="joystick"><div id="stick"></div></div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Reflector } from 'three/addons/objects/Reflector.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const clock = new THREE.Clock();
        const GRAVITY = -48.0, JUMP_FORCE = 23.0, GROUND_Y = 2.2;
        const MOVE_SPEED = 18.0, FRICTION = 0.85;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.25;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.set(0, 20, 55);

        // --- POST PROCESSING ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.45, 0.4, 0.85);
        composer.addPass(bloomPass);

        // --- LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.28));

        const movingLightGroup = new THREE.Group();
        const pointLight = new THREE.PointLight(0xffffff, 850, 400); 
        pointLight.castShadow = true;
        pointLight.shadow.bias = -0.0005;
        movingLightGroup.add(pointLight);

        const lightOrb = new THREE.Mesh(
            new THREE.SphereGeometry(0.8, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xffffff }) 
        );
        movingLightGroup.add(lightOrb);
        scene.add(movingLightGroup);

        // --- MIRROR ELEMENTS ---
        const mirrorWall = new Reflector(new THREE.PlaneGeometry(50, 30), {
            clipBias: 0.003,
            textureWidth: window.innerWidth * window.devicePixelRatio,
            textureHeight: window.innerHeight * window.devicePixelRatio,
            color: 0x888888
        });
        mirrorWall.position.set(0, 15, -45);
        mirrorWall.getRenderTarget().texture.minFilter = THREE.LinearFilter;
        mirrorWall.camera.far = 2500;
        scene.add(mirrorWall);

        const floorReflector = new Reflector(new THREE.PlaneGeometry(3000, 3000), {
            clipBias: 0.003,
            textureWidth: window.innerWidth,
            textureHeight: window.innerHeight,
            color: 0x555555
        });
        floorReflector.rotation.x = -Math.PI / 2;
        floorReflector.camera.far = 2500;
        scene.add(floorReflector);

        // Grid
        const grid = new THREE.GridHelper(2000, 80, 0x333333, 0x1a1a1a);
        grid.position.y = 0.05;
        scene.add(grid);

        // --- THE BEAN 🔥🔥🔥 ---
        const beanGroup = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.CapsuleGeometry(1.2, 2.0, 32, 32),
            new THREE.MeshPhysicalMaterial({ 
                color: 0xff2255, 
                metalness: 0.15, 
                roughness: 0.05, 
                clearcoat: 1.0 
            })
        );
        body.castShadow = true;
        
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0 });
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.28, 24, 24), eyeMat);
        eyeL.position.set(0.5, 1.3, 1.0);
        const eyeR = eyeL.clone(); eyeR.position.set(-0.5, 1.3, 1.0);

        beanGroup.add(body, eyeL, eyeR);
        beanGroup.position.y = GROUND_Y;
        scene.add(beanGroup);

        const contactShadow = new THREE.Mesh(
            new THREE.CircleGeometry(1.6, 32),
            new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.45 })
        );
        contactShadow.rotation.x = -Math.PI / 2;
        contactShadow.position.y = 0.08;
        scene.add(contactShadow);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;
        controls.minDistance = 10;
        controls.maxDistance = 300;

        // --- INPUTS & PHYSICS ---
        let velocityY = 0, isGrounded = true, joyX = 0, joyZ = 0, joystickActive = false;
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        const stick = document.getElementById('stick');
        const handleJoystick = (e) => {
            joystickActive = true;
            const touch = e.touches ? e.touches[0] : e;
            const rect = document.getElementById('joystick').getBoundingClientRect();
            joyX = (touch.clientX - (rect.left + rect.width / 2)) / (rect.width / 2);
            joyZ = (touch.clientY - (rect.top + rect.height / 2)) / (rect.height / 2);
            const mag = Math.sqrt(joyX * joyX + joyZ * joyZ);
            if (mag > 1) { joyX /= mag; joyZ /= mag; }
            stick.style.transform = `translate(${joyX * 30}px, ${joyZ * 30}px)`;
        };

        const resetJoystick = () => { joystickActive = false; joyX = 0; joyZ = 0; stick.style.transform = 'translate(0,0)'; };
        document.getElementById('joystick').addEventListener('touchstart', (e) => { e.preventDefault(); handleJoystick(e); }, {passive: false});
        document.getElementById('joystick').addEventListener('touchmove', (e) => { e.preventDefault(); handleJoystick(e); }, {passive: false});
        document.getElementById('joystick').addEventListener('touchend', resetJoystick);

        document.getElementById('jump-btn').onpointerdown = (e) => { 
            e.preventDefault(); if(isGrounded) { velocityY = JUMP_FORCE; isGrounded = false; } 
        };

        const curVel = new THREE.Vector3(), tarVel = new THREE.Vector3();

        function animate() {
            const dt = Math.min(clock.getDelta(), 0.05);
            const time = clock.getElapsedTime();
            requestAnimationFrame(animate);

            movingLightGroup.position.set(Math.sin(time * 0.4) * 50, 22 + Math.sin(time * 1.1) * 9, Math.cos(time * 0.4) * 40);

            const camF = new THREE.Vector3(); camera.getWorldDirection(camF); camF.y = 0; camF.normalize();
            const camR = new THREE.Vector3().crossVectors(camF, new THREE.Vector3(0, 1, 0));

            let inX = joyX, inZ = joyZ;
            if (keys['KeyW']) inZ = -1; if (keys['KeyS']) inZ = 1;
            if (keys['KeyA']) inX = -1; if (keys['KeyD']) inX = 1;

            tarVel.set(0, 0, 0).addScaledVector(camF, -inZ * MOVE_SPEED).addScaledVector(camR, inX * MOVE_SPEED);
            curVel.lerp(tarVel, 0.15);
            if (!joystickActive && Object.keys(keys).every(k => !keys[k])) curVel.multiplyScalar(FRICTION);

            velocityY += GRAVITY * dt;
            beanGroup.position.y += velocityY * dt;
            beanGroup.position.addScaledVector(curVel, dt);
            
            if (beanGroup.position.y <= GROUND_Y + 0.01) {
                if (!isGrounded) body.scale.set(1.4, 0.7, 1.4);
                beanGroup.position.y = GROUND_Y;
                velocityY = 0;
                isGrounded = true;
            }
            body.scale.lerp(new THREE.Vector3(1, 1, 1), 12 * dt);

            contactShadow.position.set(beanGroup.position.x, 0.08, beanGroup.position.z);
            const sDist = Math.max(0, beanGroup.position.y - GROUND_Y);
            contactShadow.scale.setScalar(1 + sDist * 0.15);
            contactShadow.material.opacity = Math.max(0, 0.45 - sDist * 0.1);

            if (curVel.length() > 0.1) {
                const angle = Math.atan2(curVel.x, curVel.z);
                beanGroup.quaternion.slerp(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), angle), 12 * dt);
            }

            controls.target.lerp(beanGroup.position, 10 * dt);
            controls.update();
            composer.render();
        }

        window.addEventListener('resize', () => {
            const w = window.innerWidth, h = window.innerHeight;
            camera.aspect = w / h; camera.updateProjectionMatrix();
            renderer.setSize(w, h); composer.setSize(w, h);
            mirrorWall.getRenderTarget().setSize(w, h);
            floorReflector.getRenderTarget().setSize(w, h);
        });

        animate();
    </script>
</body>
</html>
